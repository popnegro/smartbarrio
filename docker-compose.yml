version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartbarrio-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: smartbarrio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartbarrio-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: